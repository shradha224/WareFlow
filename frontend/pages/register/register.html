<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WareFlow | Register</title>
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="../login/login.css">
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="background-overlay"></div>
    <main class="login-container">
        <section class="login-card registration-card">
            <div class="logo-container">
                <img src="../../assets/images/logo-dark.png" alt="WareFlow Logo" class="logo">
            </div>
            <h1 class="login-title">Register</h1>
            <p class="login-subtitle">Create a new account on WareFlow</p>
            <form id="registerForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <div class="input-wrapper">
                            <input type="text" id="fullName" placeholder="e.g. John Doe" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="userId">User ID</label>
                        <div class="input-wrapper">
                            <input type="text" id="userId" placeholder="e.g. john.doe" required autocomplete="off">
                        </div>
                        <div id="userIdStatus" class="status-indicator"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" placeholder="e.g. john@factory.com" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="phoneNumber">Phone Number</label>
                        <div class="input-wrapper">
                            <input type="tel" id="phoneNumber" placeholder="e.g. +1234567890" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="department">Department</label>
                        <div class="input-wrapper">
                            <input type="text" id="department" placeholder="e.g. Production" required>
                        </div>
                    </div>
                    
                    <div class="form-group form-group-full">
                        <label for="userRole">Role</label>
                        <div class="input-wrapper">
                            <select id="userRole" required style="width: 100%; height: 62px; border: 2px solid #D8DEE8; border-radius: 16px; padding: 0 20px; font-size: 17px; outline: none; background: #FAFBFC; transition: all .25s ease; box-sizing: border-box; font-family: inherit;">
                                <option value="">Select Role</option>
                                <option value="Supervisor">Supervisor</option>
                                <option value="Inventory Inspector">Inventory Inspector</option>
                                <option value="Worker">Worker</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="Enter password" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                        </div>
                        <div id="passwordMatchStatus" class="status-indicator"></div>
                    </div>
                </div>

                <div class="password-requirements" id="passwordRequirements">
                    <h3>Password Requirements:</h3>
                    <ul>
                        <li id="req-length" class="requirement invalid">❌ Minimum 8 characters</li>
                        <li id="req-upper" class="requirement invalid">❌ One uppercase letter</li>
                        <li id="req-lower" class="requirement invalid">❌ One lowercase letter</li>
                        <li id="req-number" class="requirement invalid">❌ One number</li>
                        <li id="req-special" class="requirement invalid">❌ One special character</li>
                    </ul>
                </div>

                <button type="submit" class="login-btn" id="submitBtn">
                    Register Account
                </button>
                
                <div class="register-link-container">
                    <span>Already have an account? </span><a href="../login/login.html" class="register-link">Login Here</a>
                </div>
            </form>
        </section>
    </main>
    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="register.js"></script>
</body>
</html>
