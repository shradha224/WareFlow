<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Component Consumption</title>
    <link rel="stylesheet" href="../../../styles/global.css">
    <link rel="stylesheet" href="../../../components/sidebar/sidebar.css">
    <link rel="stylesheet" href="component-consumption.css">
</head>
<body>
<div class="dashboard-layout">
    <aside id="sidebar" class="sidebar">
        <div class="logo-container">
            <img src="../../../assets/images/logo.png"
                 class="logo"
                 alt="WareFlow Logo">
        </div>
        <nav class="sidebar-menu">
            <a href="component-consumption.html"
               class="menu-item active">
               Component Consumption
            </a>
            <a href="../material-intake/material-intake.html"
               class="menu-item">
               Materials Intake
            </a>
            <a href="../quality-check/quality-check.html"
               class="menu-item">
               Quality Check & Logs
            </a>
        </nav>
        <div class="sidebar-footer">
            <button class="logout-btn">
                Logout
            </button>
        </div>
    </aside>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <main class="dashboard-content">
        <section class="page-header">
            <div class="header-left">
                <button id="menu-toggle"> ☰ </button>
                <div>
                    <h1 class="page-title">Component Consumption</h1>
                    <p class="page-subtitle">Record component usage at each stage.</p>
        </section>
        <section class="card consumption-card">
            <h2>
                Process Component
            </h2>
            <div class="form-group">
                <label>
                    Active Batches
                </label>
                <div class="batch-selector">
                    <button
                        class="batch-btn"
                        data-batch="B012">
                    </button>
                    <button
                        class="batch-btn active"
                        data-batch="B212">
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="componentId">
                    Enter Component ID
                </label>
                <input
                    id="componentId"
                    type="text"
                    placeholder="Enter component ID">
            </div>
            <div class="form-group">
                <label for="stage">
                    Used at Place / Stage
                </label>
                <select id="stage">
                    <option value="">Select Stage</option>
                </select>
            </div>
            <button
                id="completeBtn"
                class="submit-btn">
                Mark Completed
            </button>
            <div id="consumption-progress">
                <div id="next-stage-container" style="display: none; margin-top: 20px; border: 1px solid var(--border-color, #eee); padding: 20px; border-radius: 12px; background: #FAFAFA; box-shadow: 0 4px 10px rgba(0,0,0,0.03);">
                    <p style="color: var(--primary-color, #1a56db); font-weight: 600; margin-bottom: 15px; font-size: 1.05rem;">Stage completed! Send component to next stage:</p>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="font-weight: 500; font-size: 0.95rem;">Send To Stage</label>
                        <select id="next-stage-select" style="margin-top: 8px;"></select>
                    </div>
                    <button id="send-stage-btn" class="submit-btn" style="width: 100%; margin-top: 10px;">Send</button>
                </div>
                <div id="progress-qty-container" style="display: none; margin-top: 20px; padding: 15px; border-radius: 8px; background: #e0f2fe; color: #0369a1; font-weight: 600; text-align: center; font-size: 1.1rem; border: 1px solid #bae6fd;"></div>
            </div>
        </section>
    </main>
</div>
    <script src="../../../js/config.js"></script>
    <script src="../../../js/auth.js"></script>
    <script src="../../../js/api.js"></script>
    <script src="../../../components/sidebar/sidebar.js"></script>
    <script src="component-consumption.js"></script>
</body>
</html>
