<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>QC Check</title>
    <link rel="stylesheet" href="../../../styles/global.css">
    <link rel="stylesheet" href="../../../components/sidebar/sidebar.css">

<body>
<div class="container">
    <aside id="sidebar" class="sidebar">
        <div class="logo-container">
            <img src="../../../assets/images/logo.png" class="logo" alt="WareFlow Logo">
        </div>

        <nav class="sidebar-menu">
            <a href="../warehouse-stock/warehouse-stock.html" class="menu-item">Warehouse Stock</a>

        <div class="sidebar-footer">
            <button class="logout-btn">Logout</button>

    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <main class="content">
        <header class="page-header">
            <div class="header-left">
                <button id="menu-toggle">
                    ☰
                </button>
                <div>
                    <h1 class="page-title">Quality Assurance Inspection</h1>
                    <p class="page-subtitle">Examine raw material quality and mark pass or fail.</p>
                </div>
            </div>

        <section class="card qc-card">

                <h2> Quality Assurance Queue</h2>

                <table class="table qc-table">
                    <thead>
                        <tr>

                            <th>Date Completed</th>
                            <th>Inspection Certification</th>
