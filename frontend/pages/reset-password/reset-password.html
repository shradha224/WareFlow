<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WareFlow | Reset Password</title>
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="../login/login.css">
    <link rel="stylesheet" href="../register/register.css">
    <link rel="stylesheet" href="reset-password.css">
</head>
<body>
    <div class="background-overlay"></div>
    <main class="login-container">
        <section class="login-card reset-card">
            <div class="logo-container">
                <img src="../../assets/images/logo-dark.png" alt="WareFlow Logo" class="logo">
            </div>
            <h1 class="login-title">Reset Password</h1>
            <p class="login-subtitle">Enter the OTP sent to your email and create a new password.</p>
            <form id="resetForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" readonly required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="otp">6-Digit Verification Code</label>
                    <div class="input-wrapper">
                        <input type="text" id="otp" placeholder="e.g. 123456" maxlength="6" pattern="\d{6}" required autocomplete="off" style="letter-spacing: 5px; font-weight: bold; font-size: 22px; text-align: center;">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">New Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter new password" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    </div>
                    <div id="passwordMatchStatus" class="status-indicator"></div>
                </div>

                <div class="password-requirements" id="passwordRequirements">
                    <h3>New Password Requirements:</h3>
                    <ul>
                        <li id="req-length" class="requirement invalid">❌ Minimum 8 characters</li>
                        <li id="req-upper" class="requirement invalid">❌ One uppercase letter</li>
                        <li id="req-lower" class="requirement invalid">❌ One lowercase letter</li>
                        <li id="req-number" class="requirement invalid">❌ One number</li>
                        <li id="req-special" class="requirement invalid">❌ One special character</li>
                    </ul>
                </div>

                <button type="submit" class="login-btn">
                    Reset Password
                </button>
                
                <div class="resend-wrapper" style="margin-top: 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px;">
                    <button type="button" id="resendBtn" style="background: transparent; border: 2px solid #2367C1; color: #2367C1; font-size: 16px; font-weight: 600; padding: 10px 24px; border-radius: 12px; cursor: pointer; transition: all 0.25s ease;">
                        Resend OTP Code
                    </button>
                    <div id="countdown" style="font-size: 14px; color: #666; font-weight: 500;"></div>
                </div>
                
                <div class="register-link-container">
                    <a href="../login/login.html" class="register-link">Back to Login</a>
                </div>
            </form>
        </section>
    </main>
    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="reset-password.js"></script>
</body>
</html>
