<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WareFlow | Forgot Password</title>
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="../login/login.css">
    <link rel="stylesheet" href="forgot-password.css">
</head>
<body>
    <div class="background-overlay"></div>
    <main class="login-container">
        <section class="login-card">
            <div class="logo-container">
                <img src="../../assets/images/logo-dark.png" alt="WareFlow Logo" class="logo">
            </div>
            <h1 class="login-title">Forgot Password</h1>
            <p class="login-subtitle">Enter your email address to receive a password reset OTP.</p>
            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="e.g. john@factory.com" required>
                    </div>
                </div>
                
                <button type="submit" class="login-btn">
                    Send Reset OTP
                </button>
                
                <div class="register-link-container">
                    <a href="../login/login.html" class="register-link">Back to Login</a>
                </div>
            </form>
        </section>
    </main>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="../../src/services/emailService.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/api.js"></script>
    <script src="forgot-password.js"></script>
</body>
</html>
